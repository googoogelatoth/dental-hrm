{% set t = texts if texts is defined else {} %}
<form action="/submit-attendance-request" method="post">
    <label>{{ t.get('man_date_label', 'วันที่ที่ลืมลงเวลา:') }}</label>
    <input type="date" name="request_date" required class="form-control">
    
    <div class="row">
        <div class="col">
            <label>{{ t.get('man_in_label', 'เวลาเข้า:') }}</label>
            <input type="time" name="check_in" class="form-control">
        </div>
        <div class="col">
            <label>{{ t.get('man_out_label', 'เวลาออก:') }}</label>
            <input type="time" name="check_out" class="form-control">
        </div>
    </div>
    
    <label>{{ t.get('man_reason_label', 'เหตุผล:') }}</label>
    <textarea name="reason" class="form-control" placeholder="{{ t.get('man_reason_placeholder', 'เช่น ลืมโทรศัพท์ไว้ที่รถ...') }}"></textarea>
    
    <input type="hidden" name="lat" id="lat">
    <input type="hidden" name="lon" id="lon">
    
    <button type="submit" class="btn btn-warning mt-3">{{ t.get('man_btn_submit', 'ส่งคำร้องขอแก้ไขเวลา') }}</button>
</form>
