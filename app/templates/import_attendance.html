{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="form-container shadow-sm bg-white p-4">
                <h3 class="text-primary mb-4"><i class="bi bi-file-earmark-arrow-up me-2"></i>{{ texts.import_att_title }}</h3>
                
                <div class="alert alert-warning small">
                    <strong><i class="bi bi-exclamation-triangle-fill"></i> {{ texts.import_att_format_header }}</strong><br>
                    {{ texts.import_att_format_desc }}: <code>employee_code</code>, <code>date</code> (ปปปป-ดด-วว), <code>check_in</code> (ชช:นน), <code>check_out</code> (ชช:นน)
                </div>

                <form action="/import-attendance-upload" method="post" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label fw-bold">{{ texts.import_att_columns }}</label>
                        <input type="file" name="file" class="form-control" accept=".xlsx" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-cloud-upload me-2"></i>{{ texts.import_att_btn }}
                        </button>
                        <a href="/attendance-report" class="btn btn-light text-muted">{{ texts.back }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
