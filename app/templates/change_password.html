{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="form-container shadow-lg p-4 bg-white rounded border-top border-warning border-4">
            <h3 class="text-primary mb-4 text-center">
                <i class="bi bi-shield-lock me-2"></i>{{ texts.pw_title }}
            </h3>
            
            <form action="/change-password" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ texts.pw_old_label }}</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ texts.pw_new_label }}</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="new_password" class="form-control" required minlength="4">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">{{ texts.pw_confirm_label }}</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-check-lg"></i></span>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning fw-bold py-2 shadow-sm">
                        {{ texts.pw_btn_submit }}
                    </button>
                    <a href="/dashboard" class="btn btn-light border">{{ texts.pw_btn_cancel }}</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
