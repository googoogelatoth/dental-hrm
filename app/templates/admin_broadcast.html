{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-megaphone-fill me-2"></i>{{ texts.broadcast_title }}</h5>
            </div>
            <div class="card-body p-4">
                <form action="/admin/send-broadcast" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ texts.broadcast_subject }}</label>
                        <input type="text" name="title" class="form-control form-control-lg" placeholder="{{ texts.broadcast_placeholder_title }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">{{ texts.broadcast_message }}</label>
                        <textarea name="message" class="form-control" rows="5" placeholder="{{ texts.broadcast_placeholder_msg }}" required></textarea>
                        <div class="form-text mt-2">
                            <i class="bi bi-info-circle me-1"></i> {{ texts.broadcast_info }}
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg py-3 shadow-sm" onclick="return confirm('{{ texts.broadcast_confirm }}')">
                            <i class="bi bi-send-check-fill me-2"></i>{{ texts.broadcast_btn }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
