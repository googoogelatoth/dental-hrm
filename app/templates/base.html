<head>

    {% set icon_url = "https://i.postimg.cc/65rpVym5/company-logo.png?v=1" %}

    <link rel="apple-touch-icon" sizes="152x152" href="{{ icon_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ icon_url }}">
    <link rel="apple-touch-icon" sizes="167x167" href="{{ icon_url }}">
    
    <link rel="icon" type="image/png" sizes="192x192" href="{{ icon_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ icon_url }}">

    <meta name="apple-mobile-web-app-title" content="HRM-NEXT"> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .modal-backdrop { display: none !important; }
        .modal-backdrop.show { display: block !important; opacity: 0.5 !important; }
        body { overflow: auto !important; padding-right: 0 !important; }
    </style>
</head>
<body>
    {% if request.cookies.get("is_logged_in") == "true" %}
        {% include "navbar.html" %}
    {% endif %}

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    (function () {
        function getCookie(name) {
            const cookies = document.cookie ? document.cookie.split('; ') : [];
            for (const cookie of cookies) {
                const [k, ...rest] = cookie.split('=');
                if (k === name) {
                    return decodeURIComponent(rest.join('='));
                }
            }
            return '';
        }

        function ensureCsrfInput(form, token) {
            if (!token) {
                return;
            }
            let input = form.querySelector('input[name="csrf_token"]');
            if (!input) {
                input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'csrf_token';
                form.appendChild(input);
            }
            input.value = token;
        }

        function attachCsrfToPostForms() {
            const token = getCookie('csrf_token');
            if (!token) {
                return;
            }

            document.querySelectorAll('form').forEach((form) => {
                const method = (form.getAttribute('method') || 'get').toLowerCase();
                if (method === 'post') {
                    ensureCsrfInput(form, token);
                }
            });
        }

        document.addEventListener('submit', function (event) {
            const form = event.target;
            if (!(form instanceof HTMLFormElement)) {
                return;
            }
            const method = (form.getAttribute('method') || 'get').toLowerCase();
            if (method !== 'post') {
                return;
            }
            ensureCsrfInput(form, getCookie('csrf_token'));
        });

        const originalFetch = window.fetch;
        window.fetch = function (input, init) {
            const options = init ? { ...init } : {};
            const method = (options.method || 'GET').toUpperCase();
            if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) {
                const headers = new Headers(options.headers || {});
                if (!headers.has('X-CSRF-Token')) {
                    const token = getCookie('csrf_token');
                    if (token) {
                        headers.set('X-CSRF-Token', token);
                    }
                }
                options.headers = headers;
            }
            return originalFetch(input, options);
        };

        attachCsrfToPostForms();
    })();

    const publicVapidKey = "{{ vapid_public_key }}".replace(/['"]+/g, '');
    function urlBase64ToUint8Array(base64String) {
        const cleanString = base64String.replace(/[^A-Za-z0-9\-_]/g, '');
        const base64 = cleanString.replace(/\-/g, '+').replace(/_/g, '/');
        const padNeeded = (4 - (base64.length % 4)) % 4;
        const finalBase64 = base64 + '='.repeat(padNeeded);
        try {
            const rawData = window.atob(finalBase64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        } catch (e) {
            console.error("Base64 conversion failed:", e);
            throw e;
        }
    }
    </script>
</body>
</html>
