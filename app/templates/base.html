<body>
    {% if request.cookies.get("is_logged_in") == "true" %}
        {% include "navbar.html" %}
    {% endif %}

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    (function () {
        function getCookie(name) {
            const cookies = document.cookie ? document.cookie.split('; ') : [];
            for (const cookie of cookies) {
                const [k, ...rest] = cookie.split('=');
                if (k === name) {
                    return decodeURIComponent(rest.join('='));
                }
            }
            return '';
        }

        function ensureCsrfInput(form, token) {
            if (!token) {
                return;
            }
            let input = form.querySelector('input[name="csrf_token"]');
            if (!input) {
                input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'csrf_token';
                form.appendChild(input);
            }
            input.value = token;
        }

        function attachCsrfToPostForms() {
            const token = getCookie('csrf_token');
            if (!token) {
                return;
            }

            document.querySelectorAll('form').forEach((form) => {
                const method = (form.getAttribute('method') || 'get').toLowerCase();
                if (method === 'post') {
                    ensureCsrfInput(form, token);
                }
            });
        }

        document.addEventListener('submit', function (event) {
            const form = event.target;
            if (!(form instanceof HTMLFormElement)) {
                return;
            }
            const method = (form.getAttribute('method') || 'get').toLowerCase();
            if (method !== 'post') {
                return;
            }
            ensureCsrfInput(form, getCookie('csrf_token'));
        });

        const originalFetch = window.fetch;
        window.fetch = function (input, init) {
            const options = init ? { ...init } : {};
            const method = (options.method || 'GET').toUpperCase();
            if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) {
                const headers = new Headers(options.headers || {});
                if (!headers.has('X-CSRF-Token')) {
                    const token = getCookie('csrf_token');
                    if (token) {
                        headers.set('X-CSRF-Token', token);
                    }
                }
                options.headers = headers;
            }
            return originalFetch(input, options);
        };

        attachCsrfToPostForms();
    })();

    const publicVapidKey = {{ (public_vapid_key or '')|tojson }};

    /**
     * Convert VAPID public key from Base64url to Uint8Array/ArrayBuffer
     * Handles HTML entities, quotes, URL-safe base64, and padding
     */
    function robustVapidKeyToUint8Array(base64String, returnFormat = 'Uint8Array') {
        if (!base64String || typeof base64String !== 'string') {
            throw new Error('VAPID key must be a non-empty string');
        }

        try {
            // Step 1: Decode HTML entities
            let cleanString = base64String
                .replace(/&quot;/gi, '').replace(/&#34;/gi, '').replace(/&#x22;/gi, '')
                .replace(/&apos;/gi, '').replace(/&#39;/gi, '').replace(/&#x27;/gi, '')
                .trim();
            
            // Step 2: Remove quotes and whitespace
            cleanString = cleanString.replace(/^["']|["']$/g, '').replace(/\s+/g, '');

            if (!cleanString) {
                throw new Error('VAPID key is empty after cleanup');
            }

            console.log('[VAPID] Input cleaned, length:', cleanString.length);

            // Step 3: Convert URL-safe Base64 to standard Base64
            let base64Std = cleanString.replace(/\-/g, '+').replace(/_/g, '/');

            // Step 4: Add padding (required by strict Base64 decoders like Safari)
            const padNeeded = (4 - (base64Std.length % 4)) % 4;
            if (padNeeded > 0) {
                base64Std = base64Std + '='.repeat(padNeeded);
            }

            console.log('[VAPID] After padding, length:', base64Std.length);

            // Step 5: Decode Base64
            const rawData = window.atob(base64Std);

            if (!rawData || rawData.length === 0) {
                throw new Error('Key decoded to empty data');
            }

            if (rawData.length !== 65) {
                throw new Error(`Invalid key length: ${rawData.length} bytes (expected 65 for P-256)`);  
            }

            console.log('[VAPID] Decoded to', rawData.length, 'bytes');

            // Step 6: Convert to Uint8Array
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }

            // Step 7: Validate P-256 format
            if (outputArray[0] !== 4) {
                console.warn('[VAPID] First byte is 0x' + outputArray[0].toString(16) + ', expected 0x04');
            }

            console.log('[VAPID] ✅ Key conversion successful');

            if (returnFormat === 'ArrayBuffer') {
                return outputArray.buffer.slice(0);
            }
            return outputArray;
        } catch (e) {
            console.error('[VAPID] Conversion error:', e);
            throw new Error(`VAPID conversion failed: ${e.message}`);
        }
    }

    /**
     * Subscribe to push notifications with fallback for different buffer formats
     */
    function baseUrlBase64ToUint8Array(base64String) {
        return robustVapidKeyToUint8Array(base64String, 'Uint8Array');
    }
    </script>
</body>
